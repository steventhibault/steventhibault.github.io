
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annual Training Quiz - Careco Homecare</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root {
  --blue-900:#0a1628;--blue-800:#0f2246;--blue-700:#163568;--blue-600:#1d4ed8;--blue-500:#2563eb;--blue-400:#3b82f6;--blue-300:#93c5fd;--blue-100:#dbeafe;--blue-50:#eff6ff;
  --grey-900:#111827;--grey-700:#374151;--grey-600:#4b5563;--grey-500:#6b7280;--grey-400:#9ca3af;--grey-300:#d1d5db;--grey-200:#e5e7eb;--grey-100:#f3f4f6;--grey-50:#f9fafb;
  --white:#fff;--green:#16a34a;--green-bg:#f0fdf4;--red:#dc2626;--red-bg:#fef2f2;--radius:8px;--radius-lg:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--grey-100);color:var(--grey-900);min-height:100vh;-webkit-font-smoothing:antialiased;}
input,textarea,button{font:inherit;}
header{position:sticky;top:0;z-index:100;background:var(--blue-900);border-bottom:1px solid rgba(255,255,255,.06);box-shadow:0 2px 20px rgba(0,0,0,.35);}
.header-inner{max-width:920px;margin:0 auto;padding:0 28px;height:60px;display:flex;align-items:center;gap:14px;}
.hbadge{background:var(--blue-700);color:var(--white);font-size:10px;font-weight:700;letter-spacing:.12em;padding:4px 10px;border-radius:5px;white-space:nowrap;display:flex;align-items:center;}
.hbadge img{height:32px;display:block;}
.hdiv{width:1px;height:24px;background:rgba(255,255,255,.12);}
.htitle{color:var(--white);font-size:14.5px;font-weight:600;}
.hsub{color:var(--blue-300);font-size:12px;margin-top:1px;}
.hprog{margin-left:auto;display:flex;align-items:center;gap:11px;}
.hprog-label{color:var(--blue-300);font-size:11.5px;font-weight:500;white-space:nowrap;}
.hprog-track{width:130px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
.hprog-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--blue-500),var(--blue-300));border-radius:2px;transition:width .18s ease;}
main{max-width:920px;margin:0 auto;padding:20px 28px 80px;}
.email-card{background:var(--white);border:1px solid var(--grey-200);border-radius:var(--radius-lg);padding:18px 22px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.05);display:grid;grid-template-columns:auto repeat(3,minmax(160px,1fr));gap:16px;align-items:start;}
.email-icon{width:36px;height:36px;background:var(--blue-50);border-radius:7px;display:flex;align-items:center;justify-content:center;}
.email-icon svg{width:17px;height:17px;stroke:var(--blue-500);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.field-group{display:flex;flex-direction:column;gap:6px;}
.email-label{font-size:12.5px;font-weight:600;color:var(--grey-700);display:flex;align-items:center;gap:7px;white-space:nowrap;}
.req-chip{font-size:10px;font-weight:600;color:var(--blue-600);background:var(--blue-50);border:1px solid var(--blue-100);border-radius:4px;padding:1px 7px;letter-spacing:.03em;}
.email-input{width:100%;background:var(--grey-50);border:1.5px solid var(--grey-200);border-radius:7px;padding:9px 13px;font-size:13.5px;color:var(--grey-900);outline:none;}
.email-input:focus{border-color:var(--blue-500);box-shadow:0 0 0 3px rgba(37,99,235,.1);background:var(--white);}
.email-input.error{border-color:var(--red);box-shadow:0 0 0 3px rgba(220,38,38,.08);}
.email-err,.name-err{display:none;margin-top:5px;font-size:11.5px;color:var(--red);font-weight:500;}
.field-group.has-error .email-label::after{content:' *';color:var(--red);font-weight:700;}
.section-block{margin-top:10px;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--grey-200);box-shadow:0 1px 4px rgba(0,0,0,.05);}
.section-title{display:flex;align-items:center;justify-content:space-between;gap:12px;background:#0f2557;color:white;padding:12px 16px;font-weight:700;font-size:16px;}
.section-progress{font-size:13px;font-weight:700;color:#86efac;white-space:nowrap;}
.section-title-left{display:flex;align-items:center;gap:10px;}
.s-dot{width:5px;height:5px;border-radius:50%;background:var(--blue-400);flex-shrink:0;}
.qrow{background:var(--white);border-bottom:1px solid var(--grey-100);padding:10px 18px;display:grid;grid-template-columns:34px minmax(0,1fr);gap:6px 12px;}
.qrow:last-child{border-bottom:none;}
.qrow:hover{background:var(--grey-50);}
.qrow.unanswered{background:#fff8f8;border-left:3px solid var(--red);padding-left:15px;}
.qnum{font-size:11px;font-weight:700;color:var(--grey-400);text-align:right;padding-top:3px;}
.qbody{min-width:0;}
.qtext{font-size:13px;line-height:1.32;color:var(--grey-900);margin-bottom:9px;}
.answer-list{display:grid;grid-template-columns:1fr;gap:3px;}
.answer-option{display:grid;grid-template-columns:16px minmax(0,1fr);align-items:start;gap:7px;padding:2px 0;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--grey-700);line-height:1.25;}
.answer-option input{width:15px;height:15px;margin-top:0;accent-color:var(--blue-600);cursor:pointer;}
.answer-option:hover{color:var(--blue-700);}
.answer-option.selected{color:var(--blue-700);font-weight:600;}
.answer-option.multi.selected{color:#166534;font-weight:600;}
.submit-area{margin-top:36px;display:flex;flex-direction:column;align-items:center;gap:9px;}
.submit-btn{background:var(--blue-600);color:var(--white);border:none;padding:13px 44px;border-radius:8px;font-size:14.5px;font-weight:600;cursor:pointer;box-shadow:0 4px 14px rgba(37,99,235,.35);}
.submit-btn:hover:not(:disabled){background:var(--blue-500);box-shadow:0 6px 20px rgba(37,99,235,.45);}
.submit-btn:disabled{opacity:.6;cursor:not-allowed;}
.submit-hint{font-size:11.5px;color:var(--grey-400);font-weight:500;}
#overlay{display:none;position:fixed;inset:0;background:rgba(10,22,40,.78);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;padding:20px;}
#overlay.open{display:flex;}
.rpanel{background:var(--white);border-radius:var(--radius-lg);width:100%;max-width:660px;max-height:88vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.2);border-top:4px solid var(--blue-600);}
.rhead{padding:26px 28px 18px;border-bottom:1px solid var(--grey-100);}
.rhead h2{font-size:18px;font-weight:700;color:var(--grey-900);margin-bottom:3px;display:flex;align-items:center;gap:9px;}
.rbadge{font-size:10px;font-weight:700;letter-spacing:.08em;padding:3px 9px;border-radius:20px;}
.rbadge.pass{background:var(--green-bg);color:var(--green);border:1px solid #86efac;}
.rbadge.fail{background:var(--red-bg);color:var(--red);border:1px solid #fca5a5;}
.score-row{display:flex;align-items:flex-end;gap:12px;margin:14px 0 10px;}
.score-big{font-size:44px;font-weight:700;color:var(--blue-600);line-height:1;}
.score-denom{font-size:18px;color:var(--grey-400);font-weight:400;margin-bottom:4px;}
.score-pct{font-size:14px;font-weight:600;color:var(--grey-500);margin-bottom:5px;}
.sbar{height:5px;background:var(--grey-100);border-radius:3px;overflow:hidden;margin-bottom:10px;}
.sbar-fill{height:100%;border-radius:3px;width:0;transition:width .4s ease;}
.score-note{font-size:12.5px;color:var(--grey-500);}
.wsection{padding:18px 28px 8px;}
.wsection h3{font-size:11.5px;font-weight:700;color:var(--grey-700);letter-spacing:.05em;margin-bottom:11px;display:flex;align-items:center;gap:7px;}
.wbadge{background:var(--red-bg);color:var(--red);border-radius:20px;padding:1px 8px;font-size:11px;font-weight:700;}
.witem{border:1px solid var(--grey-200);border-radius:var(--radius);padding:11px 14px;margin-bottom:8px;background:var(--grey-50);}
.wnum{font-size:10px;font-weight:700;color:var(--grey-400);letter-spacing:.05em;margin-bottom:3px;}
.wcategory{font-size:12px;font-weight:600;color:var(--blue-700);margin-bottom:6px;}
.wtext{font-size:12.5px;color:var(--grey-900);line-height:1.45;margin-bottom:7px;}
.answer-row{display:flex;gap:10px;font-size:11.5px;font-weight:600;flex-wrap:wrap;}
.ans-y{color:var(--red);background:var(--red-bg);padding:2px 8px;border-radius:4px;}
.ans-c{color:var(--green);background:var(--green-bg);padding:2px 8px;border-radius:4px;}
.estatus{margin:14px 28px;padding:10px 14px;border-radius:7px;font-size:12.5px;font-weight:600;display:none;}
.estatus.sending{background:var(--blue-50);color:var(--blue-700);border:1px solid var(--blue-100);}
.estatus.success{background:var(--green-bg);color:var(--green);border:1px solid #86efac;}
.estatus.fail{background:var(--red-bg);color:var(--red);border:1px solid #fca5a5;}
.estatus.notice{background:#fffbeb;color:#92400e;border:1px solid #fde68a;}
.rfooter{padding:14px 28px 26px;display:flex;gap:9px;}
.btn-close{flex:1;padding:10px;border-radius:7px;font-size:13.5px;font-weight:600;cursor:pointer;border:1.5px solid var(--grey-200);background:var(--white);color:var(--grey-700);}
.btn-close:hover{background:var(--grey-50);}
.btn-print{background:var(--blue-600);color:var(--white);border:none;padding:10px 22px;border-radius:7px;font-size:13.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;}
.btn-print:hover{background:var(--blue-500);}
.btn-print svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.unanswered-chip{position:fixed;right:18px;bottom:18px;z-index:150;background:#dc2626;color:white;border-radius:999px;padding:10px 16px;font-size:13px;font-weight:700;box-shadow:0 10px 30px rgba(0,0,0,.18);cursor:pointer;}
.unanswered-chip.hidden{opacity:0;pointer-events:none;}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:9999;padding:20px;}
.confirm-overlay.open{display:flex;}
.confirm-box{background:#fff;width:100%;max-width:460px;border-radius:12px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.18);}
.confirm-box h3{font-size:20px;margin-bottom:10px;}
.confirm-box p{font-size:14px;color:#4b5563;line-height:1.5;margin-bottom:18px;}
.confirm-actions{display:flex;gap:10px;}
.confirm-actions button{flex:1;padding:11px;border-radius:8px;font-weight:700;cursor:pointer;border:none;}
.confirm-cancel{background:#f3f4f6;}
.confirm-submit{background:#2563eb;color:white;}
@media(max-width:720px){
  .hprog{display:none;}
  main{padding:16px 14px 70px;}
  .header-inner{padding:0 16px;}
  .email-card{grid-template-columns:1fr;}
  .email-icon{display:none;}
  .qrow{grid-template-columns:24px minmax(0,1fr);padding:9px 12px;}
  .rfooter{flex-direction:column;}
}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="hbadge">
      <img src="https://stevethibault.com/careco-logo100.png" alt="Careco Homecare">
    </div>
    <div class="hdiv"></div>
    <div>
      <div class="htitle">Annual Training Quiz</div>
      <div class="hsub" id="header-sub"></div>
    </div>
    <div class="hprog">
      <div class="hprog-label" id="prog-label">0 of 0</div>
      <div class="hprog-track"><div class="hprog-fill" id="prog-fill"></div></div>
    </div>
  </div>
</header>

<main>
  <div class="email-card">
    <div class="email-icon">
      <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
    </div>
    <div class="field-group">
      <label class="email-label" for="taker-email">Email Address <span class="req-chip">Required</span></label>
      <input type="email" id="taker-email" class="email-input" placeholder="yourname@example.com" autocomplete="email">
      <div class="email-err" id="email-err">Please enter a valid email address.</div>
    </div>
    <div class="field-group">
      <label class="email-label" for="first-name">First Name</label>
      <input type="text" id="first-name" class="email-input" placeholder="First name" autocomplete="given-name">
      <div class="name-err" id="first-name-err">Please enter your first name.</div>
    </div>
    <div class="field-group">
      <label class="email-label" for="last-name">Last Name</label>
      <input type="text" id="last-name" class="email-input" placeholder="Last name" autocomplete="family-name">
      <div class="name-err" id="last-name-err">Please enter your last name.</div>
    </div>
  </div>

  <form id="test-form" novalidate></form>

  <div class="submit-area">
    <button class="submit-btn" id="submit-btn" type="button">Submit Quiz</button>
    <div class="submit-hint">Results are emailed automatically to you and your supervisors.</div>
  </div>
</main>

<div class="unanswered-chip hidden" id="unanswered-chip">0 unanswered</div>

<div id="overlay">
  <div class="rpanel">
    <div class="rhead">
      <h2>Quiz Results <span class="rbadge" id="rbadge">Passed</span></h2>
      <div class="score-row">
        <div class="score-big" id="s-correct">0</div>
        <div class="score-denom" id="s-denom">/ 0</div>
        <div class="score-pct" id="s-pct">0%</div>
      </div>
      <div class="sbar"><div class="sbar-fill" id="sbar-fill"></div></div>
      <div class="score-note" id="s-note"></div>
    </div>
    <div class="estatus" id="estatus"></div>
    <div class="wsection" id="wsection"></div>
    <div class="rfooter">
      <button class="btn-close" id="btn-close" type="button">Close</button>
      <button class="btn-print" id="btn-print" type="button">
        <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Print Results
      </button>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <h3>Submit quiz?</h3>
    <p id="confirm-text"></p>
    <div class="confirm-actions">
      <button class="confirm-cancel" id="confirm-cancel" type="button">Review</button>
      <button class="confirm-submit" id="confirm-submit" type="button">Submit</button>
    </div>
  </div>
</div>

    "n": 19,
    "s": "7. Caring for Dementia Clients in the Home",
    "t": "People with dementia often respond better to encouragement than to correction.",
    "type": "single",
    "options": [
      "Yes",
      "No"
    ],
    "a": "Yes"
  }
];
let _printData = {};

function escapeHtml(value){
  return String(value ?? "").replace(/[&<>"']/g, ch => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  }[ch]));
}

function validateEmail(email){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }
function answerName(q){ return `q${q.n}`; }
function correctArray(q){ return Array.isArray(q.a) ? q.a.slice() : [q.a]; }
function sameSet(a,b){
  if (a.length !== b.length) return false;
  const sa = a.slice().sort();
  const sb = b.slice().sort();
  return sa.every((v,i) => v === sb[i]);
}
function selectedValues(q){
  return Array.from(document.querySelectorAll(`input[name="${answerName(q)}"]:checked`)).map(i => i.value);
}
function isAnswered(q){ return selectedValues(q).length > 0; }
function formatAnswer(value){
  if (value === null || value === undefined || (Array.isArray(value) && value.length === 0)) return "Not answered";
  return Array.isArray(value) ? value.join("; ") : value;
}

function renderQuestions(){
  document.getElementById("header-sub").textContent = `${Q.length} questions - Annual Training`;
  document.getElementById("prog-label").textContent = `0 of ${Q.length}`;
  const container = document.getElementById("test-form");
  let currentSection = null;
  let block = null;

  Q.forEach(q => {
    if (q.s !== currentSection) {
      currentSection = q.s;
      block = document.createElement("section");
      block.className = "section-block";
      block.dataset.section = q.s;
      block.innerHTML = `<div class="section-title"><div class="section-title-left"><span class="s-dot"></span><span>${escapeHtml(q.s)}</span></div><span class="section-progress">0/0</span></div>`;
      container.appendChild(block);
    }

    const row = document.createElement("div");
    row.className = "qrow";
    row.id = `r${q.n}`;
    row.dataset.section = q.s;
    const inputType = q.type === "multi" ? "checkbox" : "radio";
    const options = q.options.map((opt, i) => {
      const id = `q${q.n}_${i}`;
      return `<label class="answer-option ${q.type}" for="${id}">
        <input id="${id}" type="${inputType}" name="${answerName(q)}" value="${escapeHtml(opt)}">
        <span>${escapeHtml(opt)}</span>
      </label>`;
    }).join("");

    row.innerHTML = `<div class="qnum">${q.n}</div><div class="qbody"><div class="qtext">${escapeHtml(q.t)}</div><div class="answer-list">${options}</div></div>`;
    block.appendChild(row);

    row.querySelectorAll("input").forEach(inp => {
      inp.addEventListener("change", () => {
        updateSelected(row);
        updateProgress();
      });
    });
  });

  updateProgress();
}

function updateSelected(row){
  row.querySelectorAll(".answer-option").forEach(label => {
    const input = label.querySelector("input");
    label.classList.toggle("selected", input.checked);
  });
}

function updateSectionProgress(){
  document.querySelectorAll(".section-block").forEach(block => {
    const rows = Array.from(block.querySelectorAll(".qrow"));
    const answered = rows.filter(row => row.querySelector("input:checked")).length;
    block.querySelector(".section-progress").textContent = `${answered}/${rows.length}`;
  });
}

function updateProgress(){
  const answered = Q.filter(isAnswered).length;
  const unanswered = Q.length - answered;
  document.getElementById("prog-label").textContent = `${answered} of ${Q.length}`;
  document.getElementById("prog-fill").style.width = `${(answered / Q.length) * 100}%`;
  const chip = document.getElementById("unanswered-chip");
  chip.textContent = `${unanswered} unanswered`;
  chip.classList.toggle("hidden", unanswered === 0);
  updateSectionProgress();
}

function showFieldError(inputId, errorId){
  const input = document.getElementById(inputId);
  input.classList.add("error");
  input.closest(".field-group").classList.add("has-error");
  document.getElementById(errorId).style.display = "block";
}

function clearFieldError(inputId, errorId){
  const input = document.getElementById(inputId);
  input.classList.remove("error");
  input.closest(".field-group").classList.remove("has-error");
  document.getElementById(errorId).style.display = "none";
}

function scoreQuiz(){
  let correct = 0;
  const wrong = [];
  Q.forEach(q => {
    const selected = selectedValues(q);
    const right = correctArray(q);
    const ok = sameSet(selected, right);
    if (ok) {
      correct++;
    } else {
      wrong.push({...q, userAnswer: q.type === "multi" ? selected : (selected[0] || null)});
    }
  });
  return {correct, wrong};
}

function wrongHtmlTable(wrong, cap){
  if (wrong.length === 0) {
    return '<p style="font-family:Arial,sans-serif;font-size:13px;color:#16a34a;font-weight:600;margin:0;">Perfect score - all answers correct.</p>';
  }
  const shown = wrong.slice(0, cap || wrong.length);
  const rows = shown.map((w, i) => {
    const bg = i % 2 === 0 ? "#ffffff" : "#f9fafb";
    return `<tr style="background:${bg};">
      <td style="padding:6px 8px;border:1px solid #e5e7eb;font-weight:700;color:#6b7280;vertical-align:top;">Q${w.n}</td>
      <td style="padding:6px 8px;border:1px solid #e5e7eb;color:#374151;vertical-align:top;font-size:11px;">${escapeHtml(w.s)}</td>
      <td style="padding:6px 8px;border:1px solid #e5e7eb;color:#111827;vertical-align:top;">${escapeHtml(w.t)}</td>
      <td style="padding:6px 8px;border:1px solid #e5e7eb;color:#dc2626;font-weight:600;vertical-align:top;">${escapeHtml(formatAnswer(w.userAnswer))}</td>
      <td style="padding:6px 8px;border:1px solid #e5e7eb;color:#16a34a;font-weight:600;vertical-align:top;">${escapeHtml(formatAnswer(correctArray(w)))}</td>
    </tr>`;
  }).join("");
  const overflow = cap && wrong.length > cap
    ? `<p style="font-family:Arial,sans-serif;font-size:11px;color:#6b7280;margin:10px 0 0;font-style:italic;">Showing ${cap} of ${wrong.length} incorrect answers. See printed results for the full list.</p>`
    : "";
  return `<table style="width:100%;border-collapse:collapse;font-family:Arial,sans-serif;font-size:12px;">
    <thead><tr style="background:#f3f4f6;">
      <th style="padding:6px 8px;text-align:left;font-weight:700;color:#374151;border:1px solid #e5e7eb;width:38px;">#</th>
      <th style="padding:6px 8px;text-align:left;font-weight:700;color:#374151;border:1px solid #e5e7eb;width:130px;">Section</th>
      <th style="padding:6px 8px;text-align:left;font-weight:700;color:#374151;border:1px solid #e5e7eb;">Question</th>
      <th style="padding:6px 8px;text-align:left;font-weight:700;color:#374151;border:1px solid #e5e7eb;width:120px;">Your Answer</th>
      <th style="padding:6px 8px;text-align:left;font-weight:700;color:#374151;border:1px solid #e5e7eb;width:120px;">Correct</th>
    </tr></thead><tbody>${rows}</tbody></table>${overflow}`;
}

function renderWrongPanel(wrong){
  const ws = document.getElementById("wsection");
  if (wrong.length === 0) {
    ws.innerHTML = '<p style="color:var(--green);font-size:13px;font-weight:600;padding-bottom:16px">Perfect score - all answers correct.</p>';
    return;
  }
  ws.innerHTML = `<h3>Incorrect Answers <span class="wbadge">${wrong.length}</span></h3>` + wrong.map(w => {
    return `<div class="witem">
      <div class="wnum">Q${w.n} - ${escapeHtml(w.s)}</div>
      <div class="wtext">${escapeHtml(w.t)}</div>
      <div class="answer-row">
        <span class="ans-y">Your answer: ${escapeHtml(formatAnswer(w.userAnswer))}</span>
        <span class="ans-c">Correct: ${escapeHtml(formatAnswer(correctArray(w)))}</span>
      </div>
    </div>`;
  }).join("");
}

function submitTest(){
  const fn = document.getElementById("first-name").value.trim();
  const ln = document.getElementById("last-name").value.trim();
  const em = document.getElementById("taker-email").value.trim();
  let err = false;
  if (!fn) { showFieldError("first-name","first-name-err"); err = true; } else clearFieldError("first-name","first-name-err");
  if (!ln) { showFieldError("last-name","last-name-err"); err = true; } else clearFieldError("last-name","last-name-err");
  if (!validateEmail(em)) { showFieldError("taker-email","email-err"); err = true; } else clearFieldError("taker-email","email-err");
  if (err) {
    document.querySelector(".email-input.error").scrollIntoView({behavior:"smooth", block:"center"});
    return;
  }

  const unanswered = Q.filter(q => !isAnswered(q));
  Q.forEach(q => document.getElementById(`r${q.n}`).classList.remove("unanswered"));
  unanswered.forEach(q => document.getElementById(`r${q.n}`).classList.add("unanswered"));

  const {correct, wrong} = scoreQuiz();
  const total = Q.length;
  const pct = Math.round((correct / total) * 100);
  const passed = pct >= 70;
  const dateStr = new Date().toLocaleString();
  _printData = {firstName:fn, lastName:ln, email:em, correct, total, pct, passed, wrong, dateStr};

  document.getElementById("s-correct").textContent = correct;
  document.getElementById("s-denom").textContent = `/ ${total}`;
  document.getElementById("s-pct").textContent = `${pct}%`;
  document.getElementById("rbadge").textContent = passed ? "Passed" : "Failed";
  document.getElementById("rbadge").className = `rbadge ${passed ? "pass" : "fail"}`;
  document.getElementById("s-note").textContent = passed ? "A passing score of 70% or higher was achieved." : "A score of 70% or higher is required to pass.";
  const fill = document.getElementById("sbar-fill");
  fill.style.background = passed ? "var(--green)" : "var(--red)";
  requestAnimationFrame(() => fill.style.width = `${pct}%`);
  renderWrongPanel(wrong);
  document.getElementById("overlay").classList.add("open");

  const btn = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.textContent = "Submitted";

  const status = document.getElementById("estatus");
  status.style.display = "block";

  if (!EMAILJS_CONFIGURED || !window.emailjs) {
    status.className = "estatus notice";
    status.textContent = "EmailJS credentials are placeholders, so results were not emailed. Add the credentials in the marked section of this HTML file.";
    return;
  }

  status.className = "estatus sending";
  status.textContent = "Sending results...";
  emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
    taker_name: `${fn} ${ln}`,
    taker_email: em,
    score: `${correct}/${total}`,
    pct: `${pct}%`,
    result: passed ? "PASSED" : "FAILED",
    result_bg: passed ? "#f0fdf4" : "#fef2f2",
    result_color: passed ? "#16a34a" : "#dc2626",
    result_border: passed ? "#86efac" : "#fca5a5",
    status_label: passed ? "Pass" : "Retake Required",
    status_color: passed ? "#16a34a" : "#dc2626",
    status_sub: `Score ${pct}% (passing: 70%)`,
    wrong_count: wrong.length,
    wrong_answers: wrongHtmlTable(wrong, 50),
    date: dateStr
  }).then(() => {
    status.className = "estatus success";
    status.textContent = `Results emailed to ${em}.`;
  }).catch(e => {
    status.className = "estatus fail";
    status.textContent = `Email failed. ${JSON.stringify(e)}`;
  });
}

document.getElementById("btn-close").addEventListener("click", () => document.getElementById("overlay").classList.remove("open"));
document.getElementById("unanswered-chip").addEventListener("click", () => {
  const next = Q.find(q => !isAnswered(q));
  if (next) document.getElementById(`r${next.n}`).scrollIntoView({behavior:"smooth", block:"center"});
});
document.getElementById("submit-btn").addEventListener("click", () => {
  const answered = Q.filter(isAnswered).length;
  const unanswered = Q.length - answered;
  document.getElementById("confirm-text").innerHTML = `You answered <strong>${answered}</strong> out of <strong>${Q.length}</strong> questions.<br><br>${
    unanswered > 0 ? `<span style="color:#dc2626">${unanswered} question(s) still unanswered.</span>` : `<span style="color:#16a34a">All questions completed.</span>`
  }`;
  document.getElementById("confirm-overlay").classList.add("open");
});
document.getElementById("confirm-cancel").addEventListener("click", () => document.getElementById("confirm-overlay").classList.remove("open"));
document.getElementById("confirm-submit").addEventListener("click", () => {
  document.getElementById("confirm-overlay").classList.remove("open");
  submitTest();
});
document.getElementById("confirm-overlay").addEventListener("click", e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove("open");
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape") document.getElementById("confirm-overlay").classList.remove("open");
});

document.getElementById("btn-print").addEventListener("click", () => {
  if (!_printData.firstName) { alert("Please submit the quiz first."); return; }
  const {firstName,lastName,email,correct,total,pct,passed,wrong,dateStr} = _printData;
  const barColor = passed ? "#16a34a" : "#dc2626";
  const html = `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Annual Training Quiz Result - ${escapeHtml(firstName)} ${escapeHtml(lastName)}</title>
  <style>
  body{font-family:Arial,sans-serif;font-size:10pt;color:#111;background:#fff;padding:0.5in 0.6in;}
  .pp-header{display:flex;align-items:flex-start;justify-content:space-between;border-bottom:2.5pt solid #0f2246;padding-bottom:10pt;margin-bottom:10pt;}
  .pp-company{font-size:14pt;font-weight:700;color:#0f2246;}
  .pp-subtitle{font-size:9pt;color:#4b5563;font-weight:500;letter-spacing:0.08em;}
  .pp-doc-info{text-align:right;font-size:8.5pt;color:#4b5563;}
  .pp-candidate{background:#eff6ff;border:1pt solid #bfdbfe;border-radius:6pt;padding:9pt 12pt;margin-bottom:10pt;display:flex;justify-content:space-between;align-items:center;}
  .pp-cand-name{font-size:13pt;font-weight:700;color:#0f2246;margin-bottom:2pt;}
  .pp-cand-email{font-size:8.5pt;color:#4b5563;}
  .pp-result-badge{font-size:11pt;font-weight:700;padding:6pt 16pt;border-radius:20pt;letter-spacing:0.05em;background:${passed ? "#f0fdf4" : "#fef2f2"};color:${barColor};border:1.5pt solid ${passed ? "#86efac" : "#fca5a5"};}
  .pp-scores{display:flex;gap:10pt;margin-bottom:10pt;}
  .pp-score-box{flex:1;border:1pt solid #e5e7eb;border-radius:6pt;padding:8pt 10pt;text-align:center;}
  .pp-score-label{font-size:7.5pt;font-weight:600;color:#6b7280;letter-spacing:0.07em;margin-bottom:3pt;}
  .pp-score-val{font-size:18pt;font-weight:700;color:#1d4ed8;line-height:1;}
  .pp-score-sub{font-size:8pt;color:#6b7280;margin-top:2pt;}
  .pp-bar-track{height:8pt;background:#e5e7eb;border-radius:4pt;overflow:hidden;margin:8pt 0 10pt;}
  .pp-bar-fill{height:100%;border-radius:4pt;width:${pct}%;background:${barColor};}
  .pp-section-title{font-size:8.5pt;font-weight:700;color:#374151;letter-spacing:0.08em;border-bottom:1pt solid #e5e7eb;padding-bottom:4pt;margin-bottom:6pt;margin-top:10pt;}
  .pp-footer{margin-top:12pt;border-top:1pt solid #e5e7eb;padding-top:7pt;display:flex;justify-content:space-between;font-size:7.5pt;color:#9ca3af;}
  @media print{body{padding:0.4in 0.5in;}}
  </style></head><body>
  <div class="pp-header"><div><div class="pp-company">Careco Homecare</div><div class="pp-subtitle">Annual Training Quiz - Official Result</div></div>
  <div class="pp-doc-info"><div><strong>Date:</strong> ${escapeHtml(dateStr)}</div><div><strong>Quiz version:</strong> ${total}-question assessment</div><div><strong>Passing threshold:</strong> 70%</div></div></div>
  <div class="pp-candidate"><div><div class="pp-cand-name">${escapeHtml(firstName)} ${escapeHtml(lastName)}</div><div class="pp-cand-email">${escapeHtml(email)}</div></div><div class="pp-result-badge">${passed ? "PASSED" : "FAILED"}</div></div>
  <div class="pp-scores"><div class="pp-score-box"><div class="pp-score-label">Score</div><div class="pp-score-val">${correct}/${total}</div><div class="pp-score-sub">Questions correct</div></div>
  <div class="pp-score-box"><div class="pp-score-label">Percentage</div><div class="pp-score-val" style="color:${barColor}">${pct}%</div><div class="pp-score-sub">${passed ? "Above passing threshold" : "Below passing threshold"}</div></div>
  <div class="pp-score-box"><div class="pp-score-label">Incorrect</div><div class="pp-score-val" style="color:${wrong.length > 0 ? "#dc2626" : "#16a34a"}">${wrong.length}</div><div class="pp-score-sub">${wrong.length === 0 ? "No errors" : "Questions to review"}</div></div></div>
  <div class="pp-bar-track"><div class="pp-bar-fill"></div></div>
  <div class="pp-section-title">Incorrect Answers (${wrong.length})</div>${wrongHtmlTable(wrong)}
  <div class="pp-footer"><div>Careco Homecare</div><div>This document was generated automatically upon quiz submission.</div><div>Printed: ${new Date().toLocaleString()}</div></div>
  <script>window.onload=function(){window.print();}<\/script></body></html>`;
  const win = window.open("", "_blank", "width=900,height=700");
  if (!win || win.closed || typeof win.closed === "undefined") {
    alert("Pop-up blocked. Please allow pop-ups for this site, then click Print Results again.");
    return;
  }
  win.document.open();
  win.document.write(html);
  win.document.close();
});

renderQuestions();
</script>
</body>
</html>
