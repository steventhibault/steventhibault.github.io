<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Stephen Thibault</title>
</head>

<body style="margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:#f6f9fc; font-family:Arial, Helvetica, sans-serif; color:#071735; padding:24px; box-sizing:border-box;">

  <form action="https://formsubmit.co/steve@stevethibault.com" method="POST" style="width:min(100%, 540px); background:#ffffff; border:1px solid #dfe7f0; border-radius:22px; padding:34px; box-shadow:0 20px 60px rgba(7,23,53,0.10); box-sizing:border-box;">

    <input type="hidden" name="_subject" value="Website inquiry from stevethibault.com">
    <input type="hidden" name="_template" value="table">
    <input type="hidden" name="_captcha" value="true">

    <label for="name" style="display:block; font-weight:800; margin:0 0 9px 0;">Name</label>
    <input id="name" type="text" name="name" placeholder="Your name" required style="width:100%; box-sizing:border-box; border:1px solid #cbd7e3; border-radius:14px; padding:14px 15px; font-size:16px; margin-bottom:20px; background:#f8fbff; color:#071735; outline:none;">

    <label for="email" style="display:block; font-weight:800; margin:0 0 9px 0;">Email</label>
    <input id="email" type="email" name="email" placeholder="your@email.com" required style="width:100%; box-sizing:border-box; border:1px solid #cbd7e3; border-radius:14px; padding:14px 15px; font-size:16px; margin-bottom:20px; background:#f8fbff; color:#071735; outline:none;">

    <label for="phone" style="display:block; font-weight:800; margin:0 0 9px 0;">Phone</label>
    <input id="phone" type="tel" name="phone" placeholder="Optional" style="width:100%; box-sizing:border-box; border:1px solid #cbd7e3; border-radius:14px; padding:14px 15px; font-size:16px; margin-bottom:20px; background:#f8fbff; color:#071735; outline:none;">

    <label for="message" style="display:block; font-weight:800; margin:0 0 9px 0;">Message</label>
    <textarea id="message" name="message" placeholder="Tell me what you are looking for..." required style="width:100%; box-sizing:border-box; min-height:150px; resize:vertical; border:1px solid #cbd7e3; border-radius:14px; padding:14px 15px; font-size:16px; font-family:Arial, Helvetica, sans-serif; margin-bottom:18px; background:#f8fbff; color:#071735; outline:none;"></textarea>

    <p style="margin:0 0 20px 0; color:#30415f; font-size:15px; line-height:1.5;">
      This form sends directly to steve@stevethibault.com.
    </p>

    <button type="submit" style="border:0; background:#2563eb; color:#ffffff; padding:14px 22px; border-radius:999px; font-size:15px; font-weight:800; cursor:pointer;">
      Send Message
    </button>

  </form>

</body>
</html>
