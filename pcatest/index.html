
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>PCA &amp; HIPAA Test — Careco Homecare</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --blue-900:#0a1628;--blue-800:#0f2246;--blue-700:#163568;--blue-600:#1d4ed8;--blue-500:#2563eb;--blue-400:#3b82f6;--blue-300:#93c5fd;--blue-100:#dbeafe;--blue-50:#eff6ff;
  --grey-900:#111827;--grey-700:#374151;--grey-600:#4b5563;--grey-500:#6b7280;--grey-400:#9ca3af;--grey-300:#d1d5db;--grey-200:#e5e7eb;--grey-100:#f3f4f6;--grey-50:#f9fafb;
  --white:#fff;--green:#16a34a;--green-bg:#f0fdf4;--red:#dc2626;--red-bg:#fef2f2;--radius:8px;--radius-lg:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--grey-100);color:var(--grey-900);min-height:100vh;-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none;}
input,textarea{user-select:text;-webkit-user-select:text;}
header{position:sticky;top:0;z-index:100;background:var(--blue-900);border-bottom:1px solid rgba(255,255,255,.06);box-shadow:0 2px 20px rgba(0,0,0,.35);}
.header-inner{max-width:920px;margin:0 auto;padding:0 28px;height:60px;display:flex;align-items:center;gap:14px;}
.hbadge{background:var(--blue-700);color:var(--white);font-size:10px;font-weight:700;letter-spacing:.12em;padding:4px 10px;border-radius:5px;white-space:nowrap;display:flex;align-items:center;}
.hbadge img{height:32px;display:block;}
.hdiv{width:1px;height:24px;background:rgba(255,255,255,.12);}
.htitle{color:var(--white);font-size:14.5px;font-weight:600;letter-spacing:-.01em;}
.hsub{color:var(--blue-300);font-size:12px;margin-top:1px;}
.hprog{margin-left:auto;display:flex;align-items:center;gap:11px;}
.hprog-label{color:var(--blue-300);font-size:11.5px;font-weight:500;white-space:nowrap;}
.hprog-track{width:130px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
.hprog-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--blue-500),var(--blue-300));border-radius:2px;}
main{max-width:920px;margin:0 auto;padding:20px 28px 80px;}
.email-card{background:var(--white);border:1px solid var(--grey-200);border-radius:var(--radius-lg);padding:18px 22px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.05);display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.email-icon{width:36px;height:36px;background:var(--blue-50);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.email-icon svg{width:17px;height:17px;stroke:var(--blue-500);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.email-label{font-size:12.5px;font-weight:600;color:var(--grey-700);display:flex;align-items:center;gap:7px;white-space:nowrap;}
.req-chip{font-size:10px;font-weight:600;color:var(--blue-600);background:var(--blue-50);border:1px solid var(--blue-100);border-radius:4px;padding:1px 7px;letter-spacing:.03em;}
.field-group{display:flex;flex-direction:column;gap:6px;flex:1;min-width:160px;}
.email-input-wrap{flex:1;max-width:360px;}
.email-input{width:100%;background:var(--grey-50);border:1.5px solid var(--grey-200);border-radius:7px;padding:9px 13px;font-family:'Inter',sans-serif;font-size:13.5px;color:var(--grey-900);outline:none;}
.email-input:focus{border-color:var(--blue-500);box-shadow:0 0 0 3px rgba(37,99,235,.1);background:var(--white);}
.email-input.error{border-color:var(--red);box-shadow:0 0 0 3px rgba(220,38,38,.08);}
.email-err,.name-err{display:none;margin-top:5px;font-size:11.5px;color:var(--red);font-weight:500;}
.field-group.has-error .email-label::after{content:' *';color:var(--red);font-weight:700;}

.section-block{margin-top:10px;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--grey-200);box-shadow:0 1px 4px rgba(0,0,0,.05);}

.section-title{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;

  background:#0f2557;
  color:white;

  padding:12px 16px;
  border-radius:12px 12px 0 0;

  font-weight:700;
  font-size:16px;
}


.section-progress{
  margin-left:auto;
  font-size:13px;
  font-weight:700;
  color:#86efac;
  white-space:nowrap;
}

.section-title-left{display:flex;align-items:center;gap:10px;}
.s-dot{width:5px;height:5px;border-radius:50%;background:var(--blue-400);flex-shrink:0;}
.section-sub{background:var(--blue-50);border-bottom:1px solid var(--blue-100);padding:4px 16px;font-size:16px;font-weight:600;color:var(--blue-700);letter-spacing:.01em;}
.qrow{background:var(--white);border-bottom:1px solid var(--grey-100);padding:3px 18px;display:flex;align-items:center;gap:10px;}
.qrow:last-child{border-bottom:none;}
.qrow:hover{background:var(--grey-50);}
.qrow.unanswered{background:#fff8f8;border-left:3px solid var(--red);padding-left:15px;}
.qnum{font-size:11px;font-weight:700;color:var(--grey-400);width:24px;text-align:right;flex-shrink:0;}
.qtext{flex:1;font-size:13px;line-height:1.15;color:var(--grey-900);}
.radio-pair{display:flex;gap:7px;flex-shrink:0;}
.rpill{display:flex;align-items:center;gap:5px;padding:5px 13px;border-radius:15px;border:1px solid var(--grey-200);background:var(--grey-50);cursor:pointer;font-size:12px;font-weight:600;color:var(--grey-500);user-select:none;white-space:nowrap;}
.rpill input[type="radio"]{display:none;}
.rpill:hover{border-color:var(--blue-400);color:var(--blue-600);background:var(--blue-50);}
.rpill.true-pill.selected{border-color:var(--green);background:var(--green-bg);color:var(--green);}
.rpill.false-pill.selected{border-color:var(--red);background:var(--red-bg);color:var(--red);}
.mc-options{display:flex;flex-direction:column;gap:3px;min-width:260px;}
.mc-pill{display:grid;grid-template-columns:16px minmax(0,1fr);align-items:start;gap:7px;padding:2px 0;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--grey-700);line-height:1.25;}
.mc-pill input[type="radio"]{width:15px;height:15px;margin-top:0;accent-color:var(--blue-600);cursor:pointer;}
.mc-pill:hover{color:var(--blue-700);}
.mc-pill.selected{color:var(--blue-700);font-weight:600;}
.submit-area{margin-top:36px;display:flex;flex-direction:column;align-items:center;gap:9px;}
.submit-btn{background:var(--blue-600);color:var(--white);border:none;padding:13px 44px;border-radius:8px;font-family:'Inter',sans-serif;font-size:14.5px;font-weight:600;letter-spacing:-.01em;cursor:pointer;box-shadow:0 4px 14px rgba(37,99,235,.35);}
.submit-btn:hover:not(:disabled){background:var(--blue-500);box-shadow:0 6px 20px rgba(37,99,235,.45);}
.submit-btn:disabled{opacity:.6;cursor:not-allowed;}
.submit-hint{font-size:11.5px;color:var(--grey-400);font-weight:500;}

/* Results overlay */
#overlay{display:none;position:fixed;inset:0;background:rgba(10,22,40,.78);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;padding:20px;}
#overlay.open{display:flex;}
.rpanel{background:var(--white);border-radius:var(--radius-lg);width:100%;max-width:620px;max-height:88vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.2);border-top:4px solid var(--blue-600);}
.rhead{padding:26px 28px 18px;border-bottom:1px solid var(--grey-100);}
.rhead h2{font-size:18px;font-weight:700;color:var(--grey-900);letter-spacing:-.02em;margin-bottom:3px;display:flex;align-items:center;gap:9px;}
.rbadge{font-size:10px;font-weight:700;letter-spacing:.08em;padding:3px 9px;border-radius:20px;}
.rbadge.pass{background:var(--green-bg);color:var(--green);border:1px solid #86efac;}
.rbadge.fail{background:var(--red-bg);color:var(--red);border:1px solid #fca5a5;}
.score-row{display:flex;align-items:flex-end;gap:12px;margin:14px 0 10px;}
.score-big{font-size:44px;font-weight:700;color:var(--blue-600);letter-spacing:-.04em;line-height:1;}
.score-denom{font-size:18px;color:var(--grey-400);font-weight:400;margin-bottom:4px;}
.score-pct{font-size:14px;font-weight:600;color:var(--grey-500);margin-bottom:5px;}
.sbar{height:5px;background:var(--grey-100);border-radius:3px;overflow:hidden;margin-bottom:10px;}
.sbar-fill{height:100%;border-radius:3px;width:0;}
.score-note{font-size:12.5px;color:var(--grey-500);}
.wsection{padding:18px 28px 8px;}
.wsection h3{font-size:11.5px;font-weight:700;color:var(--grey-700);letter-spacing:.05em;margin-bottom:11px;display:flex;align-items:center;gap:7px;}
.wbadge{background:var(--red-bg);color:var(--red);border-radius:20px;padding:1px 8px;font-size:11px;font-weight:700;}
.witem{border:1px solid var(--grey-200);border-radius:var(--radius);padding:11px 14px;margin-bottom:8px;background:var(--grey-50);}
.wnum{font-size:10px;font-weight:700;color:var(--grey-400);letter-spacing:.05em;margin-bottom:3px;}
.wcategory{font-size:12px;font-weight:600;color:var(--blue-700);margin-bottom:6px;}
.wtext{font-size:12.5px;color:var(--grey-900);line-height:1.45;margin-bottom:7px;}
.answer-row{display:flex;gap:10px;font-size:11.5px;font-weight:600;flex-wrap:wrap;}
.ans-y{color:var(--red);background:var(--red-bg);padding:2px 8px;border-radius:4px;}
.ans-c{color:var(--green);background:var(--green-bg);padding:2px 8px;border-radius:4px;}
.estatus{margin:14px 28px;padding:10px 14px;border-radius:7px;font-size:12.5px;font-weight:600;display:none;}
.estatus.sending{background:var(--blue-50);color:var(--blue-700);border:1px solid var(--blue-100);}
.estatus.success{background:var(--green-bg);color:var(--green);border:1px solid #86efac;}
.estatus.fail{background:var(--red-bg);color:var(--red);border:1px solid #fca5a5;}
.rfooter{padding:14px 28px 26px;display:flex;gap:9px;}
.btn-close{flex:1;padding:10px;border-radius:7px;font-family:'Inter',sans-serif;font-size:13.5px;font-weight:600;cursor:pointer;border:1.5px solid var(--grey-200);background:var(--white);color:var(--grey-700);}
.btn-close:hover{background:var(--grey-50);}
.btn-print{background:var(--blue-600);color:var(--white);border:none;padding:10px 22px;border-radius:7px;font-family:'Inter',sans-serif;font-size:13.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;}
.btn-print:hover{background:var(--blue-500);}
.btn-print svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

@media(max-width:600px){.hprog{display:none;}.email-card{flex-direction:column;align-items:stretch;gap:10px;}.email-input-wrap{max-width:100%;}}

/* ===== Enhanced UX Features ===== */

.unanswered-chip{position:fixed;right:18px;bottom:18px;z-index:150;background:#dc2626;color:white;border-radius:999px;padding:10px 16px;font-size:13px;font-weight:700;box-shadow:0 10px 30px rgba(0,0,0,.18);cursor:pointer;}
.unanswered-chip.hidden{opacity:0;pointer-events:none;}

.confirm-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}


.confirm-overlay.open{
  display:flex;
}


.confirm-box{
  background:#fff;
  width:100%;
  max-width:460px;
  border-radius:12px;
  padding:24px;
  box-shadow:0 10px 30px rgba(0,0,0,.18);
}

.confirm-box h3{
  font-size:20px;
  margin-bottom:10px;
}
.confirm-box p{
  font-size:14px;
  color:#4b5563;
  line-height:1.5;
  margin-bottom:18px;
}
.confirm-actions{
  display:flex;
  gap:10px;
}
.confirm-actions button{
  flex:1;
  padding:11px;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
  border:none;
}
.confirm-cancel{background:#f3f4f6;}
.confirm-submit{background:#2563eb;color:white;}

/* ===== Stability Fixes ===== */
html{scroll-behavior:smooth;}

<header>

    <div class="hdiv"></div>

      <div class="htitle">PCA &amp; HIPAA Test</div>
      <div class="hsub" id="header-sub"></div>

</header>

<main>

  <div class="email-card">
    <div class="email-icon">
      <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
    </div>
    <div class="field-group">
      <label class="email-label" for="taker-email">Email Address <span class="req-chip">Required</span></label>
      <div class="email-input-wrap">
        <input type="email" id="taker-email" class="email-input" placeholder="yourname@example.com" autocomplete="email"/>
        <div class="email-err" id="email-err">Please enter a valid email address.</div>
      </div>
    </div>
    <div class="field-group">
      <label class="email-label" for="first-name">First Name</label>
      <div class="email-input-wrap">
        <input type="text" id="first-name" class="email-input" placeholder="First name" autocomplete="given-name"/>
        <div class="name-err" id="first-name-err">Please enter your first name.</div>
      </div>
    </div>
    <div class="field-group">
      <label class="email-label" for="last-name">Last Name</label>
      <div class="email-input-wrap">
        <input type="text" id="last-name" class="email-input" placeholder="Last name" autocomplete="family-name"/>
        <div class="name-err" id="last-name-err">Please enter your last name.</div>
      </div>
    </div>
  </div>

  <div id="test-form"></div>

  <div class="submit-area">
    <button class="submit-btn" id="submit-btn" >Submit</button>
    <div class="submit-hint">Results are emailed automatically to you and your supervisors.</div>
  </div>

<div class="unanswered-chip hidden" id="unanswered-chip">0 unanswered</div>
</main>

<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <h3>Ready to submit?</h3>
    <p id="confirm-text"></p>
    <div class="confirm-actions">
      <button class="confirm-cancel" id="confirm-cancel">Review Answers</button>
      <button class="confirm-submit" id="confirm-submit">Submit Test</button>
    </div>
  </div>
</div>

<div id="overlay">
  <div class="rpanel">
    <div class="rhead">
      <h2>Test Results <span class="rbadge" id="rbadge"></span></h2>
      <div class="score-row">
        <div class="score-big" id="s-correct"></div>
        <div>
          <div class="score-denom" id="s-denom"></div>
          <div class="score-pct" id="s-pct"></div>
        </div>
      </div>
      <div class="sbar"><div class="sbar-fill" id="sbar-fill"></div></div>
      <div class="score-note" id="s-note"></div>
    </div>
    <div class="wsection" id="wsection"></div>
    <div class="estatus" id="estatus"></div>
    <div class="rfooter">
      <button class="btn-close" id="btn-close">← Close &amp; Review</button>
      <button class="btn-print" id="btn-print">
        <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Print Results
      </button>
    </div>
  </div>
</div>

(function(){
  document.addEventListener('contextmenu',function(e){e.preventDefault();return false;});
  document.addEventListener('keydown',function(e){
    if(e.keyCode===123){e.preventDefault();return false;}
    if(e.ctrlKey||e.metaKey){
      if(['u','s','a'].includes((e.key||'').toLowerCase())){e.preventDefault();return false;}
      if(e.shiftKey&&['i','j','c'].includes((e.key||'').toLowerCase())){e.preventDefault();return false;}
    }
  });
  document.addEventListener('dragstart',function(e){e.preventDefault();return false;});
})();

/* ── render ── */
(function renderQuestions(){
  document.getElementById('header-sub').textContent=`${Q.length} questions · True / False`;
  document.getElementById('prog-label').textContent=`0 of ${Q.length}`;
  const container=document.getElementById('test-form');
  let curS=null,curB=null,curBlock=null;
  Q.forEach(function(q){
    if(q.s!==curS){curS=q.s;curB=null;curBlock=document.createElement('div');curBlock.className='section-block';
const safeId='sp-'+q.s.replace(/[^a-zA-Z0-9]/g,'');

curBlock.innerHTML=`
  <div class="section-title">

    <div class="section-title-left">
      <span class="s-dot"></span>
      <span>${q.s}</span>
    </div>

    <span class="section-progress" id="${safeId}">
      0/?
    </span>

  </div>
`;
container.appendChild(curBlock);}
    if(q.b&&q.b!==curB){curB=q.b;const sub=document.createElement('div');sub.className='section-sub';sub.textContent=q.b;curBlock.appendChild(sub);}
    const row=document.createElement('div');row.className='qrow';row.id=`r${q.n}`;
    if(q.type==='mc'){
      const optH=q.options.map((o,i)=>`<label class="mc-pill" id="mc${q.n}_${i}"><input type="radio" name="q${q.n}" value="${o}"><span>${o}</span></label>`).join('');
      row.innerHTML=`<div class="qnum">${q.n}</div><div class="qtext">${q.t}</div><div class="mc-options">${optH}</div>`;
    }else{
      row.innerHTML=`<div class="qnum">${q.n}</div><div class="qtext">${q.t}</div><div class="radio-pair"><label class="rpill true-pill" id="pt${q.n}"><input type="radio" name="q${q.n}" value="true"> True</label><label class="rpill false-pill" id="pf${q.n}"><input type="radio" name="q${q.n}" value="false"> False</label></div>`;
    }
    curBlock.appendChild(row);
    row.querySelectorAll('input[type="radio"]').forEach(function(inp){
      inp.addEventListener('change',function(){
        if(q.type==='mc'){row.querySelectorAll('.mc-pill').forEach(p=>p.classList.remove('selected'));inp.parentElement.classList.add('selected');}
        else{document.getElementById(`pt${q.n}`).classList.toggle('selected',inp.value==='true');document.getElementById(`pf${q.n}`).classList.toggle('selected',inp.value==='false');}
        updateProgress();
      });
    });
  });
  // Initialize section counters with correct totals
  const sectionTotals={};
  Q.forEach(q=>{sectionTotals[q.s]=(sectionTotals[q.s]||0)+1;});
  Object.entries(sectionTotals).forEach(([name,total])=>{
    const el=document.getElementById('sp-'+name.replace(/[^a-zA-Z0-9]/g,''));
    if(el) el.textContent=`0/${total}`;
  });
})();

/* ── Enhanced Features ── */
function enhancedProgressUpdate(answered){
  const unanswered=Q.length-answered;
  const chip=document.getElementById('unanswered-chip');
  if(chip){
    if(unanswered>0){chip.classList.remove('hidden');chip.textContent=`${unanswered} unanswered`;}
    else{chip.classList.add('hidden');}
  }
  const sections={};
  Q.forEach(q=>{
    if(!sections[q.s]) sections[q.s]={total:0,answered:0};
    sections[q.s].total++;
    if(document.querySelector(`input[name="q${q.n}"]:checked`)) sections[q.s].answered++;
  });
  Object.entries(sections).forEach(([name,data])=>{
    const el=document.getElementById('sp-'+name.replace(/[^a-zA-Z0-9]/g,''));
    if(!el) return;
    if(data.answered===data.total){el.textContent='✓ Complete';el.style.color='#86efac';}
    else{el.textContent=`${data.answered}/${data.total}`;el.style.color='#93c5fd';}
  });
}

function updateProgress(){
  const answered=Q.filter(q=>document.querySelector(`input[name="q${q.n}"]:checked`)).length;
  document.getElementById('prog-label').textContent=`${answered} of ${Q.length}`;
  document.getElementById('prog-fill').style.width=`${(answered/Q.length)*100}%`;
  enhancedProgressUpdate(answered);
}

function validateEmail(v){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);}
function showFieldError(id,eid){const el=document.getElementById(id);el.classList.add('error');el.closest('.field-group').classList.add('has-error');document.getElementById(eid).style.display='block';}
function clearFieldError(id,eid){const el=document.getElementById(id);el.classList.remove('error');el.closest('.field-group').classList.remove('has-error');document.getElementById(eid).style.display='none';}
['first-name','last-name','taker-email'].forEach(function(id){

    this.classList.remove('error');

let _printData=null;
document.getElementById('btn-print').addEventListener('click',function(){
  if(!_printData) return;
  const {firstName,lastName,email,correct,total,pct,passed,wrong,dateStr}=_printData;
  const barColor=passed?'#16a34a':'#dc2626';
  let wrongHTML='';
  if(wrong.length===0){
    wrongHTML=`<div class="pp-perfect">🎉 Perfect score — all ${total} answers correct!</div>`;
  }else{
    const rows=wrong.map(w=>{
      const ya=w.userAnswer===null?'Not answered':(typeof w.userAnswer==='boolean'?(w.userAnswer?'True':'False'):w.userAnswer);
      const ca=typeof w.a==='boolean'?(w.a?'True':'False'):w.a;
      return `<tr><td style="width:28pt;text-align:center;font-weight:600;color:#6b7280;">Q${w.n}</td><td style="width:100pt;font-size:8pt;color:#374151;">${w.s}${w.b?`<br><span style="color:#6b7280;font-style:italic;">${w.b}</span>`:''}</td><td>${w.t}</td><td class="pp-ans-wrong">${ya}</td><td class="pp-ans-right">${ca}</td></tr>`;
    }).join('');
    wrongHTML=`<table class="pp-wrong-table"><thead><tr><th style="width:28pt">#</th><th style="width:100pt">Section</th><th>Question</th><th>Your Answer</th><th>Correct Answer</th></tr></thead><tbody>${rows}</tbody></table>`;
  }

  const html=`<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PCA &amp; HIPAA Test Result — ${firstName} ${lastName}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',Arial,sans-serif;font-size:10pt;color:#111;background:#fff;padding:0.5in 0.6in;}
.pp-header{display:flex;align-items:flex-start;justify-content:space-between;border-bottom:2.5pt solid #0f2246;padding-bottom:10pt;margin-bottom:10pt;}
.pp-logo-area{display:flex;flex-direction:column;gap:3pt;}
.pp-company{font-size:14pt;font-weight:700;color:#0f2246;letter-spacing:-0.02em;}
.pp-subtitle{font-size:9pt;color:#4b5563;font-weight:500;letter-spacing:0.08em;}
.pp-doc-info{text-align:right;font-size:8.5pt;color:#4b5563;}
.pp-doc-info strong{color:#111;}
.pp-candidate{background:#eff6ff;border:1pt solid #bfdbfe;border-radius:6pt;padding:9pt 12pt;margin-bottom:10pt;display:flex;justify-content:space-between;align-items:center;}
.pp-cand-name{font-size:13pt;font-weight:700;color:#0f2246;margin-bottom:2pt;}
.pp-cand-email{font-size:8.5pt;color:#4b5563;}
.pp-result-badge{font-size:11pt;font-weight:700;padding:6pt 16pt;border-radius:20pt;letter-spacing:0.05em;}
.pp-result-badge.pass{background:#f0fdf4;color:#16a34a;border:1.5pt solid #86efac;}
.pp-result-badge.fail{background:#fef2f2;color:#dc2626;border:1.5pt solid #fca5a5;}
.pp-scores{display:flex;gap:10pt;margin-bottom:10pt;}
.pp-score-box{flex:1;border:1pt solid #e5e7eb;border-radius:6pt;padding:8pt 10pt;text-align:center;}
.pp-score-label{font-size:7.5pt;font-weight:600;color:#6b7280;letter-spacing:0.07em;margin-bottom:3pt;}
.pp-score-val{font-size:18pt;font-weight:700;color:#1d4ed8;line-height:1;}
.pp-score-sub{font-size:8pt;color:#6b7280;margin-top:2pt;}
.pp-bar-row{margin-bottom:10pt;}
.pp-bar-label{font-size:8pt;color:#6b7280;margin-bottom:3pt;display:flex;justify-content:space-between;}
.pp-bar-track{height:8pt;background:#e5e7eb;border-radius:4pt;overflow:hidden;}
.pp-bar-fill{height:100%;border-radius:4pt;}
.pp-section-title{font-size:8.5pt;font-weight:700;color:#374151;letter-spacing:0.08em;border-bottom:1pt solid #e5e7eb;padding-bottom:4pt;margin-bottom:6pt;margin-top:10pt;}
.pp-wrong-table{width:100%;border-collapse:collapse;font-size:8.5pt;}
.pp-wrong-table th{background:#f3f4f6;padding:4pt 6pt;text-align:left;font-weight:600;color:#374151;border:0.5pt solid #e5e7eb;font-size:7.5pt;letter-spacing:0.05em;}
.pp-wrong-table td{padding:4pt 6pt;border:0.5pt solid #e5e7eb;vertical-align:top;line-height:1.35;}
.pp-wrong-table tr:nth-child(even) td{background:#f9fafb;}
.pp-ans-wrong{color:#dc2626;font-weight:600;}
.pp-ans-right{color:#16a34a;font-weight:600;}
.pp-footer{margin-top:12pt;border-top:1pt solid #e5e7eb;padding-top:7pt;display:flex;justify-content:space-between;font-size:7.5pt;color:#9ca3af;}
.pp-perfect{text-align:center;padding:14pt;background:#f0fdf4;border:1pt solid #86efac;border-radius:6pt;color:#16a34a;font-weight:600;font-size:10pt;}
@media print{body{padding:0.4in 0.5in;}}

</style>
</head>
<body>
<div class="pp-header">
  <div class="pp-logo-area">
    <div class="pp-company">Careco Homecare</div>
    <div class="pp-subtitle">PCA &amp; HIPAA Competency Test — Official Result</div>
  </div>
  <div class="pp-doc-info">
    <div><strong>Date:</strong> ${dateStr}</div>
    <div><strong>Test version:</strong> ${total}-question assessment</div>
    <div><strong>Passing threshold:</strong> 70%</div>
  </div>
</div>
<div class="pp-candidate">
  <div>
    <div class="pp-cand-name">${firstName} ${lastName}</div>
    <div class="pp-cand-email">${email}</div>
  </div>
  <div class="pp-result-badge ${passed?'pass':'fail'}">${passed?'PASSED':'FAILED'}</div>
</div>
<div class="pp-scores">
  <div class="pp-score-box">
    <div class="pp-score-label">Score</div>
    <div class="pp-score-val">${correct}/${total}</div>
    <div class="pp-score-sub">Questions correct</div>
  </div>
  <div class="pp-score-box">
    <div class="pp-score-label">Percentage</div>
    <div class="pp-score-val" style="color:${barColor}">${pct}%</div>
    <div class="pp-score-sub">${passed?'Above passing threshold':'Below passing threshold'}</div>
  </div>
  <div class="pp-score-box">
    <div class="pp-score-label">Incorrect</div>
    <div class="pp-score-val" style="color:${wrong.length>0?'#dc2626':'#16a34a'}">${wrong.length}</div>
    <div class="pp-score-sub">${wrong.length===0?'No errors':'Questions to review'}</div>
  </div>
  <div class="pp-score-box">
    <div class="pp-score-label">Status</div>
    <div class="pp-score-val" style="font-size:12pt;line-height:1.3;padding-top:4pt;color:${barColor}">${passed?'Competency Verified':'Retake Required'}</div>
    <div class="pp-score-sub">Score ${pct}% (passing: 70%)</div>
  </div>
</div>
<div class="pp-bar-row">
  <div class="pp-bar-label"><span>Score</span><span>${pct}% (passing: 70%)</span></div>
  <div class="pp-bar-track"><div class="pp-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
</div>
${wrong.length>0?`<div class="pp-section-title">Incorrect Answers (${wrong.length})</div>`:'<div class="pp-section-title">Incorrect Answers</div>'}
${wrongHTML}
<div class="pp-footer">
  <div>Careco Homecare · york@carecohomecare.com</div>
  <div>This document was generated automatically upon test submission.</div>
  <div>Printed: ${new Date().toLocaleString()}</div>
</div>
<script>window.onload=function(){window.print();}<\/script>

</body>
</html>`;

  const win=window.open('','_blank','width=900,height=700');
  if(!win||win.closed||typeof win.closed==='undefined'){
    alert('Pop-up blocked! Please allow pop-ups for this site to print results, then click Print Results again.');
    return;
  }
  win.document.open();
  win.document.write(html);
  win.document.close();
});

/* ── SUBMIT ── */
document.getElementById('btn-close').addEventListener('click',function(){document.getElementById('overlay').classList.remove('open');});

function submitTest(){
  const fn=document.getElementById('first-name').value.trim();
  const ln=document.getElementById('last-name').value.trim();
  const em=document.getElementById('taker-email').value.trim();
  let err=false;
  if(!fn){showFieldError('first-name','first-name-err');err=true;}else{clearFieldError('first-name','first-name-err');}
  if(!ln){showFieldError('last-name','last-name-err');err=true;}else{clearFieldError('last-name','last-name-err');}
  if(!validateEmail(em)){showFieldError('taker-email','email-err');err=true;}else{clearFieldError('taker-email','email-err');}
  if(err){document.querySelector('.email-input.error').scrollIntoView({behavior:'smooth',block:'center'});return;}

  const unanswered=Q.filter(q=>!document.querySelector(`input[name="q${q.n}"]:checked`));
  Q.forEach(q=>document.getElementById(`r${q.n}`).classList.remove('unanswered'));
  unanswered.forEach(q=>document.getElementById(`r${q.n}`).classList.add('unanswered'));


  let correct=0;const wrong=[];
  Q.forEach(function(q){
    const sel=document.querySelector(`input[name="q${q.n}"]:checked`);
    const ua=sel?(q.type==='mc'?sel.value:sel.value==='true'):null;
    if(ua===q.a)correct++;else wrong.push(Object.assign({},q,{userAnswer:ua}));
  });

  const total=Q.length,pct=Math.round(correct/total*100),passed=pct>=70;
  const dateStr=new Date().toLocaleString();

  // Store for print
  _printData={firstName:fn,lastName:ln,email:em,correct,total,pct,passed,wrong,dateStr};

  document.getElementById('s-correct').textContent=correct;
  document.getElementById('s-denom').textContent=`/ ${total}`;
  document.getElementById('s-pct').textContent=`${pct}%`;
  document.getElementById('rbadge').textContent=passed?'Passed':'Failed';
  document.getElementById('rbadge').className=`rbadge ${passed?'pass':'fail'}`;
  document.getElementById('s-note').textContent=passed?'Congratulations! A passing score of 70% or higher was achieved.':'A score of 70% or higher is required to pass. Please review and retake.';
  const fillEl=document.getElementById('sbar-fill');
  fillEl.style.background=passed?'var(--green)':'var(--red)';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{fillEl.style.width=`${pct}%`;}));

  const wsEl=document.getElementById('wsection');
  if(wrong.length===0){
    wsEl.innerHTML='<p style="color:var(--green);font-size:13px;font-weight:600;padding-bottom:16px">Perfect score — all answers correct!</p>';
  }else{
    wsEl.innerHTML=`<h3>Incorrect Answers <span class="wbadge">${wrong.length}</span></h3>`+wrong.map(w=>{
      const ya=w.userAnswer===null?'Not answered':(typeof w.userAnswer==='boolean'?(w.userAnswer?'True':'False'):w.userAnswer);
      const ca=typeof w.a==='boolean'?(w.a?'True':'False'):w.a;
      return `<div class="witem"><div class="wnum">Q${w.n} · ${w.s}</div>${w.b?`<div class="wcategory">${w.b}</div>`:''}<div class="wtext">${w.t}</div><div class="answer-row"><span class="ans-y">Your answer: ${ya}</span><span class="ans-c">Correct: ${ca}</span></div></div>`;
    }).join('');
  }

  document.getElementById('overlay').classList.add('open');
  const btn=document.getElementById('submit-btn');btn.disabled=true;btn.textContent='Submitted';

  const statusEl=document.getElementById('estatus');
  if(typeof emailjs!=='undefined'){
    statusEl.style.display='block';statusEl.className='estatus sending';statusEl.textContent='Sending results…';
    const EMAIL_CAP=50;
    const wrongCapped=wrong.slice(0,EMAIL_CAP);
    const overflowNote=wrong.length>EMAIL_CAP
      ?`<p style="font-family:Arial,sans-serif;font-size:11px;color:#6b7280;margin:10px 0 0;font-style:italic;">Showing ${EMAIL_CAP} of ${wrong.length} incorrect answers. See printed results for the full list.</p>`
      :'';
    const wrongHtml=wrong.length===0
      ?'<p style="font-family:Arial,sans-serif;font-size:13px;color:#16a34a;font-weight:600;">🎉 Perfect score — all answers correct!</p>'
      :`<table style="width:100%;border-collapse:collapse;font-family:Arial,sans-serif;font-size:12px;">
  <thead>
    <tr style="background:#f3f4f6;">
      <th style="padding:6px 8px;text-align:left;font-weight:700;color:#374151;border:1px solid #e5e7eb;width:32px;">#</th>
      <th style="padding:6px 8px;text-align:left;font-weight:700;color:#374151;border:1px solid #e5e7eb;width:130px;">Section</th>
      <th style="padding:6px 8px;text-align:left;font-weight:700;color:#374151;border:1px solid #e5e7eb;">Question</th>
      <th style="padding:6px 8px;text-align:left;font-weight:700;color:#374151;border:1px solid #e5e7eb;width:70px;">Your Answer</th>
      <th style="padding:6px 8px;text-align:left;font-weight:700;color:#374151;border:1px solid #e5e7eb;width:70px;">Correct</th>
    </tr>
  </thead>
  <tbody>${wrongCapped.map((w,i)=>{
    const ya=w.userAnswer===null?'Not answered':(typeof w.userAnswer==='boolean'?(w.userAnswer?'True':'False'):w.userAnswer);
    const ca=typeof w.a==='boolean'?(w.a?'True':'False'):w.a;
    const bg=i%2===0?'#ffffff':'#f9fafb';
    return `<tr style="background:${bg};">
      <td style="padding:6px 8px;border:1px solid #e5e7eb;font-weight:700;color:#6b7280;vertical-align:top;">Q${w.n}</td>
      <td style="padding:6px 8px;border:1px solid #e5e7eb;color:#374151;vertical-align:top;font-size:11px;">${w.s}${w.b?`<br><span style="color:#6b7280;font-style:italic;">${w.b}</span>`:''}</td>
      <td style="padding:6px 8px;border:1px solid #e5e7eb;color:#111827;vertical-align:top;">${w.t}</td>
      <td style="padding:6px 8px;border:1px solid #e5e7eb;color:#dc2626;font-weight:600;vertical-align:top;">${ya}</td>
      <td style="padding:6px 8px;border:1px solid #e5e7eb;color:#16a34a;font-weight:600;vertical-align:top;">${ca}</td>
    </tr>`;
  }).join('')}</tbody>
</table>${overflowNote}`;
    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      taker_name:`${fn} ${ln}`,taker_email:em,score:`${correct}/${total}`,pct:`${pct}%`,result:passed?'PASSED':'FAILED',
      result_bg:passed?'#f0fdf4':'#fef2f2',result_color:passed?'#16a34a':'#dc2626',result_border:passed?'#86efac':'#fca5a5',
      status_label:passed?'Pass':'Retake Required',status_color:passed?'#16a34a':'#dc2626',status_sub:`Score ${pct}% (passing: 70%)`,
      wrong_count:wrong.length,wrong_answers:wrongHtml,date:dateStr
    }).then(()=>{statusEl.className='estatus success';statusEl.textContent=`Results emailed to ${em}, york@carecohomecare.com, and steven.thibault@gmail.com`;})
      .catch(e=>{statusEl.className='estatus fail';statusEl.textContent=`Email failed. (${JSON.stringify(e)})`;});
  }
}


// Unanswered chip click
document.getElementById('unanswered-chip')?.addEventListener('click',function(){
  const next=Q.find(q=>!document.querySelector(`input[name="q${q.n}"]:checked`));
  if(next) document.getElementById(`r${next.n}`).scrollIntoView({behavior:'smooth',block:'center'});
});


// Confirm modal — shown when user clicks Submit Test
document.getElementById('submit-btn').addEventListener('click',function(e){
  e.stopPropagation();
  const answered=Q.filter(q=>document.querySelector(`input[name="q${q.n}"]:checked`)).length;
  const unanswered=Q.length-answered;
  const confirmText=document.getElementById('confirm-text');
  if(confirmText){
    confirmText.innerHTML=`You answered <strong>${answered}</strong> out of <strong>${Q.length}</strong> questions.<br><br>${
      unanswered>0
        ?`<span style="color:#dc2626">${unanswered} question(s) still unanswered.</span>`
        :`<span style="color:#16a34a">All questions completed ✓</span>`
    }`;
  }
  document.getElementById('confirm-overlay').classList.add('open');
});

// Confirm modal — cancel
document.getElementById('confirm-cancel').addEventListener('click',function(){
  document.getElementById('confirm-overlay').classList.remove('open');
});

// Confirm modal — confirm submit (calls the real submitTest)
document.getElementById('confirm-submit').addEventListener('click',function(){
  document.getElementById('confirm-overlay').classList.remove('open');
  submitTest();
});

// Click outside modal to close
document.getElementById('confirm-overlay').addEventListener('click',function(e){
  if(e.target===this) this.classList.remove('open');
});

// Escape key to close modal
document.addEventListener('keydown',function(e){
  if(e.key==='Escape') document.getElementById('confirm-overlay').classList.remove('open');
});

</script>

</body>
</html>
